name: Testnet Docker Build

on:
  push:
    branches: [main]
    paths:
      - "apps/pbtc-bridge-api/**"
      - "apps/pbtc-portal/**"
      - "monitoring/**"
      - "docker-compose.testnet.yml"
      - ".github/workflows/testnet-docker.yml"
  pull_request:
    paths:
      - "apps/pbtc-bridge-api/**"
      - "apps/pbtc-portal/**"
      - "monitoring/**"
      - "docker-compose.testnet.yml"
      - ".github/workflows/testnet-docker.yml"

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build-bridge-api:
    name: Build Bridge API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/pbtc-bridge-api
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/pbtc-bridge-api:testnet
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/pbtc-bridge-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-portal:
    name: Build Portal image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/pbtc-portal
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/pbtc-portal:testnet
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/pbtc-portal:${{ github.sha }}
          build-args: |
            VITE_PULSECHAIN_CHAIN_ID=943
            VITE_PULSECHAIN_RPC_URL=https://rpc.v4.testnet.pulsechain.com
            VITE_PULSECHAIN_NETWORK_NAME=Pulsechain Testnet
            VITE_PULSECHAIN_EXPLORER_BASE_URL=https://scan.v4.testnet.pulsechain.com
            VITE_BRIDGE_API_URL=http://localhost:3007
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-check:
    name: Validate compose file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy testnet env
        run: cp .env.testnet.example .env.testnet

      - name: Validate compose config
        run: docker compose -f docker-compose.testnet.yml --env-file .env.testnet config --quiet
