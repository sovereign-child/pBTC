name: pBTC Bridge API

on:
  push:
    branches:
      - main
    paths:
      - "apps/pbtc-bridge-api/**"
      - ".github/workflows/pbtc-bridge-api.yml"
  pull_request:
    paths:
      - "apps/pbtc-bridge-api/**"
      - ".github/workflows/pbtc-bridge-api.yml"
  workflow_dispatch:

jobs:
  pbtc-bridge-api-contract-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/pbtc-bridge-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: apps/pbtc-bridge-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Contract smoke tests
        run: npm run test:contract