name: pulsechain-validator-sidecar

services:
  tbtc-monitor:
    build:
      context: ../../monitoring
      dockerfile: Dockerfile
    image: tbtc-v2-monitoring:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-testnet}
      ETHEREUM_URL: ${PULSECHAIN_RPC_URL}
      ELECTRUM_URL: ${ELECTRUM_URL}
      DATA_DIR_PATH: ${DATA_DIR_PATH:-/mnt/data}
      TRANSACTION_FEE_RECIPIENT_ADDRESS: ${TRANSACTION_FEE_RECIPIENT_ADDRESS:-}
      LARGE_DEPOSIT_THRESHOLD_SAT: ${LARGE_DEPOSIT_THRESHOLD_SAT:-1000000000}
      LARGE_REDEMPTION_THRESHOLD_SAT: ${LARGE_REDEMPTION_THRESHOLD_SAT:-1000000000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    command:
      [
        "sh",
        "-lc",
        "while true; do node .; sleep ${MONITOR_INTERVAL_SEC:-90}; done",
      ]
    volumes:
      - monitor_data:/mnt/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /mnt/data"]
      interval: 30s
      timeout: 10s
      retries: 3

  guardian-heartbeat:
    image: curlimages/curl:8.12.1
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "sh",
        "-lc",
        "if [ \"${GUARDIAN_HEARTBEAT_ENABLED:-true}\" != \"true\" ]; then echo 'guardian-heartbeat disabled'; sleep infinity; fi; while true; do payload=$$(printf '{\"guardianId\":\"%s\",\"version\":\"%s\"}' \"${GUARDIAN_ID:-unknown-guardian}\" \"${GUARDIAN_VERSION:-monitoring-local}\"); curl -sS -X POST -H 'content-type: application/json' -d \"$$payload\" \"${BRIDGE_API_HEARTBEAT_URL:-http://host.docker.internal:3007/guardians/heartbeat}\" >/dev/null && echo \"guardian heartbeat sent\" || echo \"guardian heartbeat failed\"; sleep ${GUARDIAN_HEARTBEAT_INTERVAL_SEC:-30}; done",
      ]
    depends_on:
      - tbtc-monitor

volumes:
  monitor_data:
