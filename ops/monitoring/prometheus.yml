global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: pbtc-bridge-api
    metrics_path: /metrics
    static_configs:
      - targets: ["bridge-api:3007"]
        labels:
          service: bridge-api
          environment: testnet
